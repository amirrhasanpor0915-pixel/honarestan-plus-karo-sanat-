<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" href="assets/image/لوگو.jpg">
    <title>ثبت‌نام | کار و صنعت | مدرسه تخصصی رشته‌ها</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Tahoma', 'Vazirmatn', 'Peyda', 'IRANSans', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f5 0%, #d9e2e9 100%);
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .register-card {
            background-color: #ffffff;
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 2px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .school-header {
            background: #1a3e4c;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            border-bottom: 6px solid #f9b81b;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,240,0.08);
            padding: 0.4rem 0.8rem;
            border-radius: 60px;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background: #fef3cf;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            color: #b45f1b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px dashed #e6b15c;
            overflow: hidden;
        }
        
        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 0.65rem;
            color: #f9e0a0;
            background: #2e5a6b;
            padding: 3px 8px;
            border-radius: 30px;
            font-weight: 500;
        }

        .school-title h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .school-title p {
            color: #f9d56e;
            font-weight: 500;
            font-size: 0.7rem;
            margin-top: 3px;
        }

        .majors-section {
            background: #fef9ef;
            padding: 1rem;
            border-bottom: 1px solid #ffe0b5;
        }

        .majors-title {
            font-size: 1rem;
            font-weight: 700;
            color: #2b5e6e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .majors-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            align-items: stretch;
        }

        .major-card {
            background: white;
            border-radius: 20px;
            padding: 0.7rem;
            width: 110px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffe0b0;
            transition: transform 0.2s;
        }
        
        .major-card:hover {
            transform: translateY(-3px);
        }

        .major-logo-box {
            width: 65px;
            height: 65px;
            background: #f7e5cc;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px auto;
            overflow: hidden;
            box-shadow: inset 0 1px 2px #fff8, 0 4px 8px #0001;
        }
        
        .major-logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .major-logo-placeholder {
            font-size: 1.8rem;
        }

        .major-name {
            font-weight: 800;
            font-size: 0.85rem;
            color: #1f4e5c;
            margin-top: 4px;
        }
        
        .form-section {
            padding: 1.2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .input-group label {
            font-weight: 700;
            color: #1f4e5c;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-group input, .input-group select {
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.9rem;
            background: #fff;
            transition: 0.2s;
            outline: none;
            font-weight: 500;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #f9b81b;
            box-shadow: 0 0 0 3px rgba(249,184,27,0.2);
        }

        button.submit-btn {
            background: #1a5d6b;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border-radius: 48px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.8rem;
            width: 100%;
            box-shadow: 0 4px 0 #0c3a44;
        }

        button.submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0c3a44;
        }

        .message-area {
            margin-top: 1rem;
            background: #f0f7fa;
            border-radius: 28px;
            padding: 0.8rem 1rem;
            font-size: 0.85rem;
            text-align: center;
            border-right: 6px solid #f9b81b;
            color: #1e2f35;
        }

        .contact-note {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            background: #eef4fc;
            padding: 6px 12px;
            border-radius: 40px;
            text-align: center;
            color: #005f73;
        }

        footer {
            background: #f2e8da;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5a5a54;
        }
        
        .devside-credit {
            margin-top: 12px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
            background: linear-gradient(135deg, #1a3e4c 0%, #2c5a6b 100%);
            display: inline-block;
            width: auto;
            padding: 6px 18px;
            border-radius: 40px;
            color: #f9d56e;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            direction: ltr;
        }
        
        .footer-credit {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        @media (max-width: 250px) {
            body {
                padding: 0.5rem;
            }
            .school-header {
                padding: 0.6rem;
                gap: 0.5rem;
            }
            .logo-placeholder {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .logo-text {
                font-size: 0.55rem;
            }
            .school-title h1 {
                font-size: 1rem;
            }
            .school-title p {
                font-size: 0.6rem;
            }
            .major-card {
                width: 95px;
                padding: 0.5rem;
            }
            .major-logo-box {
                width: 55px;
                height: 55px;
            }
            .major-logo-placeholder {
                font-size: 1.5rem;
            }
            .major-name {
                font-size: 0.7rem;
            }
            .form-section {
                padding: 0.8rem;
            }
            .input-group input, .input-group select {
                padding: 7px 10px;
                font-size: 0.8rem;
            }
            button.submit-btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            .message-area {
                font-size: 0.7rem;
                padding: 0.6rem;
            }
            .contact-note {
                font-size: 0.7rem;
            }
            .devside-credit {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
        }
        
        @media (min-width: 251px) and (max-width: 500px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .major-card {
                width: 120px;
            }
        }
        
        @media (min-width: 501px) {
            .form-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
            .major-card {
                width: 160px;
            }
            .school-title h1 {
                font-size: 1.9rem;
            }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="register-card">

        <div class="school-header">
            <div class="logo-area">
                <div class="logo-placeholder" id="mainSchoolLogo">
                    🏫
                </div>
                <div class="logo-text">
                </div>
            </div>
            <div class="school-title">
                <h1>هنرستان کار و صنعت</h1>
                <p>پیشرو در آموزش مهارت‌های فنی و حرفه‌ای</p>
            </div>
            <div style="width: 40px;"></div>
        </div>

        <div class="majors-section">
            <div class="majors-title">
                🎓 رشته‌های تحصیلی
            </div>
            <div class="majors-grid" id="majorsGrid"></div>
        </div>

        <div class="form-section">
            <form id="registerForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>🇮🇷 کد ملی (10 رقم)</label>
                        <input type="text" id="nationalCode" maxlength="10" placeholder="مثال: 1234567890" required>
                    </div>
                    <div class="input-group">
                        <label>👤 نام</label>
                        <input type="text" id="firstName" placeholder="علی" required>
                    </div>
                    <div class="input-group">
                        <label>👨‍👩‍👧 نام خانوادگی</label>
                        <input type="text" id="lastName" placeholder="رضایی" required>
                    </div>
                    <div class="input-group">
                        <label>📚 رشته تحصیلی</label>
                        <select id="major" required>
                            <option value="" disabled selected>– انتخاب رشته –</option>
                            <option value="کامپیوتر">کامپیوتر</option>
                            <option value="تاسیسات">تاسیسات</option>
                            <option value="معماری">معماری</option>
                            <option value="حسابداری">حسابداری</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>📖 پایه تحصیلی</label>
                        <select id="grade" required>
                            <option value="" disabled selected>– پایه –</option>
                            <option value="دهم">دهم</option>
                            <option value="یازدهم">یازدهم</option>
                            <option value="دوازدهم">دوازدهم</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>📞 شماره تماس (موبایل)</label>
                        <input type="tel" id="phone" placeholder="09151234567" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn">✅ ثبت نام اولیه</button>
            </form>
            <div id="messageBox" class="message-area">
                ✨ پس از ثبت نام، اطلاعات شما ذخیره می‌شود.
            </div>
            <div class="contact-note">
                📢 توجه: چنانچه بعد از ۲۴ ساعت با شما تماس گرفته نشد، لطفاً با شماره <strong dir="ltr">09151176863</strong> تماس بگیرید.
            </div>
        </div>
        <footer>
            © ۱۴۰۴ - هنرستان کار و صنعت | همه حقوق محفوظ است.
            <div class="footer-credit">
                <span class="devside-credit">تهیه شده از گروه DevSide</span>
            </div>
        </footer>
    </div>
</div>

<script>
    const majorsList = [
        { name: "کامپیوتر", icon: "💻", imgSrc: "assets/image/شبکه.jpg", color: "#e3f2fd" },
        { name: "تاسیسات", icon: "🔧", imgSrc: "assets/image/تاسیسات.jpg", color: "#fff3e0" },
        { name: "معماری", icon: "🏛️", imgSrc: "assets/image/معماری.jpg", color: "#f1f8e9" },
        { name: "حسابداری", icon: "🧾", imgSrc: "assets/image/حسابداری.jpg", color: "#fce4ec" }
    ];

    const majorsGrid = document.getElementById('majorsGrid');
    
    function renderMajorCards() {
        majorsGrid.innerHTML = '';
        majorsList.forEach(major => {
            const card = document.createElement('div');
            card.className = 'major-card';
            const logoHtml = `
                <div class="major-logo-box" style="background: ${major.color};">
                    <img src="${major.imgSrc}" alt="لوگوی ${major.name}" 
                         onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'major-logo-placeholder\'>${major.icon}</div>';">
                </div>
            `;
            card.innerHTML = `${logoHtml}<div class="major-name">${major.name}</div>`;
            majorsGrid.appendChild(card);
        });
    }
    
    renderMajorCards();

    const registerForm = document.getElementById('registerForm');
    const messageBox = document.getElementById('messageBox');
    
    function validateNationalCode(code) {
        return /^\d{10}$/.test(code);
    }
    
    function validatePhone(phone) {
        return /^09\d{9}$/.test(phone);
    }
    
    function showRegistrationMessage(isSuccess, additionalMsg = "") {
        if (isSuccess) {
            messageBox.innerHTML = `
                <span style="color:#1e7b49;">✅ ثبت نام شما با موفقیت انجام شد!</span><br>
                ⚠️ <strong>توجه مهم:</strong> چنانچه بعد از ۲۴ ساعت با شما تماس گرفته نشده، لطفاً با شماره <strong dir="ltr">09151176863</strong> تماس بگیرید.<br>
                <span style="font-size:0.85rem;">${additionalMsg}</span>
            `;
            messageBox.style.borderRightColor = "#f9b81b";
            messageBox.style.background = "#e6f4ea";
        } else {
            messageBox.innerHTML = `
                <span style="color:#b33;">❌ خطا در ثبت نام: ${additionalMsg}</span><br>
                لطفاً اطلاعات را بررسی کنید.
            `;
            messageBox.style.borderRightColor = "#e06c6c";
            messageBox.style.background = "#ffe9e9";
        }
    }
    
    registerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nationalCode = document.getElementById('nationalCode').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const major = document.getElementById('major').value;
        const grade = document.getElementById('grade').value;
        const phone = document.getElementById('phone').value.trim();
        
        let hasError = false;
        let errorMsg = "";
        
        if (!nationalCode) {
            errorMsg = "کد ملی الزامی است.";
            hasError = true;
        } else if (!validateNationalCode(nationalCode)) {
            errorMsg = "کد ملی باید ۱۰ رقم عددی باشد.";
            hasError = true;
        }
        
        if (!firstName) {
            errorMsg = "نام را وارد کنید.";
            hasError = true;
        } else if (firstName.length < 2) {
            errorMsg = "نام باید حداقل دو کاراکتر باشد.";
            hasError = true;
        }
        
        if (!lastName) {
            errorMsg = "نام خانوادگی الزامی است.";
            hasError = true;
        }
        
        if (!major) {
            errorMsg = "لطفاً رشته تحصیلی را انتخاب کنید.";
            hasError = true;
        }
        
        if (!grade) {
            errorMsg = "پایه تحصیلی را انتخاب نمایید.";
            hasError = true;
        }
        
        if (!phone) {
            errorMsg = "شماره تماس ضروری می‌باشد.";
            hasError = true;
        } else if (!validatePhone(phone)) {
            errorMsg = "شماره موبایل باید با 09 شروع و ۱۱ رقم باشد (مثال: 09151234567).";
            hasError = true;
        }
        
        if (hasError) {
            showRegistrationMessage(false, errorMsg);
            messageBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            return;
        }
        
        let allRegistrations = [];
        const stored = localStorage.getItem('karSanatRegistrations');
        if (stored) {
            try {
                allRegistrations = JSON.parse(stored);
            } catch(e) { allRegistrations = []; }
        }
        
        const newRecord = {
            id: Date.now(),
            nationalCode: nationalCode,
            firstName: firstName,
            lastName: lastName,
            major: major,
            grade: grade,
            phone: phone,
            registeredAt: new Date().toISOString(),
            timestamp: Date.now()
        };
        
        allRegistrations.push(newRecord);
        localStorage.setItem('karSanatRegistrations', JSON.stringify(allRegistrations));
        
        showRegistrationMessage(true, `کد رهگیری: ${newRecord.id.toString().slice(-6)}`);
        
        console.log("ثبت نام جدید:", { firstName, lastName, major, grade, phone });
        messageBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("ثبت نام کار و صنعت", {
                body: `${firstName} ${lastName} عزیز، در صورت عدم تماس پس از ۲۴ ساعت با 09151176863 تماس بگیرید.`
            });
        } else if ("Notification" in window && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    });
    
    function checkPreviousUncontacted() {
        const storedRegs = localStorage.getItem('karSanatRegistrations');
        if (storedRegs) {
            try {
                const regs = JSON.parse(storedRegs);
                if (regs.length > 0) {
                    const lastReg = regs[regs.length - 1];
                    const now = Date.now();
                    const twentyFourHours = 24 * 60 * 60 * 1000;
                    if ((now - lastReg.timestamp) >= twentyFourHours) {
                        if (messageBox && !messageBox.innerHTML.includes("تماس گرفته نشده")) {
                            messageBox.innerHTML = `
                                <span>⚠️ یادآوری: شما در تاریخ ${new Date(lastReg.registeredAt).toLocaleString('fa-IR')} ثبت نام کردید. اگر تاکنون تماسی با شما گرفته نشده، لطفاً با شماره <strong dir="ltr">09151176863</strong> تماس بگیرید.</span>
                                <br><span style="font-size:0.8rem;">(در صورت ثبت نام جدید، این پیام به‌روز می‌شود)</span>
                            `;
                            messageBox.style.borderRightColor = "#f9b81b";
                            messageBox.style.background = "#fff1cf";
                        }
                    }
                }
            } catch(e) {}
        }
    }
    
    checkPreviousUncontacted();
</script>
</body>
</html>
